<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Brain Dump</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#0f0f13',
            'app-sidebar': '#15151a',
            'app-header': 'rgba(17, 17, 21, 0.7)',
            'app-text': '#d4d4d8',

          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],

          animation: {
            'fade-in-up': 'fadeInUp 0.5s ease-out',

          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Merriweather:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="custom-utilities">
    /* Custom scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 6px;

    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(39, 39, 42, 0.5);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(63, 63, 70, 0.8);
    }

      background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='rgba(161, 161, 170, 0.4)' stroke-width='1' stroke-dasharray='6%2c 6' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");

    }

      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);

<i class="fa-solid fa-border-all"></i>
</button>
<button class="w-10 h-10 rounded-lg hover:bg-app-surface hover:text-white flex items-center justify-center transition-all">
<i class="fa-regular fa-calendar"></i>
</button>
<button class="w-10 h-10 rounded-lg hover:bg-app-surface hover:text-white flex items-center justify-center transition-all">
<i class="fa-solid fa-expand"></i>
</button>
<button class="w-10 h-10 rounded-lg bg-app-surface text-app-accent flex items-center justify-center transition-all shadow-sm ring-1 ring-white/5">

<button class="w-10 h-10 rounded-lg hover:bg-app-surface hover:text-white flex items-center justify-center transition-all">

</button>

<h1 class="text-lg font-semibold text-white/90 tracking-wide">Brain Dump <span class="text-white/50 text-sm font-normal">/ Week 22</span></h1>
</div>
<div class="h-4 w-px bg-white/10 mx-2"></div>
<div class="flex items-center space-x-2 text-sm text-app-text-muted">
<button class="hover:text-white px-2 py-1 transition-colors"><i class="fa-solid fa-chevron-left text-xs"></i></button>
<button class="px-3 py-1 rounded bg-white/5 border border-white/10 hover:bg-white/10 transition-colors text-white/80">Today</button>
<button class="hover:text-white px-2 py-1 transition-colors"><i class="fa-solid fa-chevron-right text-xs"></i></button>

</div>
</div>
<div class="flex items-center space-x-5 text-app-text-muted">

</button>

<!-- END: Header -->

<div class="flex-1 overflow-y-auto p-8 max-w-5xl mx-auto w-full flex flex-col space-y-10 z-10 relative">

<div>

<p class="text-app-text-muted text-lg text-white/60 leading-relaxed max-w-xl">
          Empty your mind. Don't worry about order or priority yet. Just get it all out of your system.
        </p>
</div>
<!-- BEGIN: Input Area Section -->
<section class="flex flex-col space-y-4">
<div class="relative glass-panel rounded-2xl p-6 border border-white/5 shadow-2xl transition-all focus-within:ring-1 focus-within:ring-app-accent/30 focus-within:border-app-accent/20 group">
<textarea class="w-full bg-transparent text-2xl md:text-3xl font-serif text-white/90 placeholder-white/20 resize-none focus:outline-none focus:ring-0 border-none p-0 min-h-[180px] leading-relaxed" placeholder="What's on your mind? Start typing anything... (Ctrl+Enter to save)"></textarea>
<div class="absolute bottom-6 left-6 opacity-0 group-focus-within:opacity-100 transition-opacity text-xs text-white/30 font-mono">
            Writing mode active
          </div>
</div>
<div class="flex justify-end pb-4 border-b border-white/5">
<button class="flex items-center space-x-2 px-5 py-2.5 glass-panel rounded-xl text-sm font-medium text-app-text-muted hover:text-white hover:border-white/20 transition-all shadow-sm">
<i class="fa-solid fa-sparkles text-app-accent"></i>
<span>Structure Tasks</span>
</button>
</div>
</section>
<!-- END: Input Area Section -->

<div class="flex items-center space-x-3">

</div>
<button class="flex items-center space-x-2 px-4 py-2 bg-gradient-to-r from-app-purple to-indigo-600 text-white rounded-xl text-sm font-medium hover:from-indigo-500 hover:to-purple-500 transition-all shadow-lg shadow-indigo-500/20">
<i class="fa-regular fa-paper-plane"></i>
<span>Send to Distribution</span>
</button>

<!-- Task List -->

<span class="px-2.5 py-1 rounded-md bg-emerald-500/10 text-emerald-300 border border-emerald-500/20 text-xs font-semibold tracking-wider">DV LAB</span>

</button>
</div>
</section>
<!-- END: Unprocessed Tasks Section -->
</div>
</div>
</div>
<!-- END: Scrollable Content -->
</main>
